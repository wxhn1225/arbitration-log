<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Style B · 深海蓝（清爽深色）</title>
<style>
/* ── Style B：深海 · 蓝绿调 · 清爽有层次 ── */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root{
  --bg:#08111e;
  --card:#0d1c30;
  --card2:#0f2035;
  --border:rgba(56,189,248,.12);
  --border2:rgba(56,189,248,.26);
  --text:#e0f2fe;
  --muted:rgba(224,242,254,.48);
  --accent:#22d3ee;   /* cyan */
  --accent2:#38bdf8;  /* sky */
  --glow-color:rgba(34,211,238,.20);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',ui-sans-serif,system-ui,sans-serif;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 1000px 700px at 20% 0%,  rgba(14,116,144,.18) 0%,transparent 60%),
    radial-gradient(ellipse 700px 500px  at 85% 100%,rgba(6,182,212,.10) 0%,transparent 55%);
  color:var(--text);
  min-height:100vh;
  padding:40px 20px;
  -webkit-font-smoothing:antialiased;
}
h2{font-size:13px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:24px;text-align:center;opacity:.7}
.wrap{max-width:760px;margin:0 auto}

.site-title{
  font-size:22px;font-weight:800;letter-spacing:-.3px;color:var(--accent);
  margin-bottom:32px;display:inline-block;
  text-shadow:0 0 24px rgba(34,211,238,.35);
}

/* card */
.card{
  background:linear-gradient(160deg,var(--card) 0%,var(--card2) 100%);
  border:1px solid var(--border);
  border-radius:20px;
  padding:22px;
  box-shadow:0 1px 0 rgba(56,189,248,.06) inset,
             0 16px 48px rgba(0,0,0,.50),
             0 0 0 1px rgba(56,189,248,.04);
  transition:border-color .2s,box-shadow .2s;
}
.card:hover{
  border-color:var(--border2);
  box-shadow:0 1px 0 rgba(56,189,248,.10) inset,
             0 20px 64px rgba(0,0,0,.55),
             0 0 40px rgba(34,211,238,.08);
}

/* run header */
.run-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
.run-left{display:flex;align-items:center;gap:10px}
.run-idx{
  height:28px;min-width:44px;padding:0 11px;border-radius:999px;
  font-size:12px;font-weight:800;letter-spacing:1.2px;
  color:var(--accent);border:1.5px solid rgba(34,211,238,.30);
  background:rgba(34,211,238,.08);display:inline-flex;align-items:center;justify-content:center;
}
.run-sub{font-size:14px;font-weight:500;color:var(--muted)}

/* grade badges */
.grade{
  width:54px;height:54px;border-radius:14px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:900;position:relative;overflow:hidden;flex-shrink:0;
}
.grade-f   {color:rgba(224,242,254,.28);background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08)}
.grade-am  {color:#34d399;background:rgba(52,211,153,.08);border:1.5px solid rgba(52,211,153,.22);
            box-shadow:0 0 18px rgba(52,211,153,.14)}
.grade-a   {color:#38bdf8;background:rgba(56,189,248,.08);border:1.5px solid rgba(56,189,248,.28);
            box-shadow:0 0 22px rgba(56,189,248,.20);animation:ab 3.5s ease-in-out infinite}
.grade-ap  {color:#a78bfa;background:rgba(167,139,250,.10);border:1.5px solid rgba(167,139,250,.32);
            box-shadow:0 0 28px rgba(167,139,250,.24);animation:aplus 2s ease-in-out infinite}
.grade-s   {color:#fde68a;background:linear-gradient(135deg,rgba(245,158,11,.18),rgba(251,191,36,.08));
            border:2px solid rgba(251,191,36,.40);box-shadow:0 0 0 4px rgba(245,158,11,.08),0 0 36px rgba(245,158,11,.32);
            animation:sglow 1.6s ease-in-out infinite}
.grade-s::before{content:"";position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 35%,rgba(255,252,180,.5) 50%,transparent 65%);
  animation:sweep 1.9s linear infinite}
@keyframes ab    {0%,100%{box-shadow:0 0 22px rgba(56,189,248,.18)}50%{box-shadow:0 0 34px rgba(56,189,248,.36)}}
@keyframes aplus {0%,100%{box-shadow:0 0 28px rgba(167,139,250,.22);transform:scale(1)}50%{box-shadow:0 0 44px rgba(167,139,250,.44);transform:scale(1.05)}}
@keyframes sglow {0%,100%{box-shadow:0 0 0 4px rgba(245,158,11,.08),0 0 36px rgba(245,158,11,.30)}50%{box-shadow:0 0 0 6px rgba(245,158,11,.16),0 0 52px rgba(245,158,11,.52)}}
@keyframes sweep {0%{transform:translateX(-160%)}100%{transform:translateX(260%)}}

/* big metrics */
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.metric{
  border-radius:14px;padding:18px 18px 14px;
  background:rgba(0,0,0,.22);
  border:1px solid rgba(56,189,248,.10);
  position:relative;overflow:hidden;
}
.metric::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;border-radius:14px 14px 0 0}
.m-a::before{background:linear-gradient(90deg,#22d3ee,transparent)}
.m-b::before{background:linear-gradient(90deg,#38bdf8,transparent)}
.m-c::before{background:linear-gradient(90deg,#a78bfa,transparent)}
.m-d::before{background:linear-gradient(90deg,#fbbf24,transparent)}
.metric-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-top:1px}
.metric-value{font-size:62px;font-weight:800;letter-spacing:-2px;font-variant-numeric:tabular-nums;margin-top:8px;line-height:1.02;color:var(--text)}

/* small */
.smalls{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
.mini{border:1px solid rgba(56,189,248,.10);border-radius:12px;padding:10px 12px;background:rgba(0,0,0,.14)}
.mini-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.mini-value{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text);margin-top:4px}

.note{text-align:center;margin-top:16px;font-size:12px;color:var(--muted);opacity:.7}
</style>
</head>
<body>
<div class="wrap">
  <div class="site-title">arbitration-log</div>
  <h2>Style B · 深海蓝 · 清爽冷调 · 层次感强</h2>

  <div class="card">
    <div class="run-header">
      <div class="run-left">
        <span class="run-idx">01</span>
        <span class="run-sub">Casta · 谷神星 · 防御 · Grineer</span>
      </div>
      <div class="grade grade-am">A-</div>
    </div>
    <div class="metrics">
      <div class="metric m-a"><div class="metric-label">无人机生成</div><div class="metric-value">1584</div></div>
      <div class="metric m-b"><div class="metric-label">敌人生成</div><div class="metric-value">8441</div></div>
      <div class="metric m-c"><div class="metric-label">无人机/分钟</div><div class="metric-value">25.45</div></div>
      <div class="metric m-d"><div class="metric-label">总时间</div><div class="metric-value">1h 2m</div></div>
    </div>
    <div class="smalls">
      <div class="mini"><div class="mini-label">波次</div><div class="mini-value">123</div></div>
      <div class="mini"><div class="mini-label">轮次</div><div class="mini-value">41</div></div>
      <div class="mini"><div class="mini-label">期望生息</div><div class="mini-value">614.0</div></div>
      <div class="mini"><div class="mini-label">生息/h</div><div class="mini-value">591.9</div></div>
      <div class="mini"><div class="mini-label">生息/min</div><div class="mini-value">9.87</div></div>
    </div>
  </div>

  <br>
  <div class="card">
    <div class="run-header">
      <div class="run-left">
        <span class="run-idx">02</span>
        <span class="run-sub">Cinxia · 谷神星 · 拦截 · Grineer</span>
      </div>
      <div class="grade grade-s">S</div>
    </div>
    <div class="metrics">
      <div class="metric m-a"><div class="metric-label">无人机生成</div><div class="metric-value">1610</div></div>
      <div class="metric m-b"><div class="metric-label">敌人生成</div><div class="metric-value">9227</div></div>
      <div class="metric m-c"><div class="metric-label">无人机/分钟</div><div class="metric-value">26.07</div></div>
      <div class="metric m-d"><div class="metric-label">总时间</div><div class="metric-value">1h 1m</div></div>
    </div>
  </div>
  <p class="note">← 深海蓝背景、cyan 点缀、渐变顶边条</p>
</div>
</body>
</html>
